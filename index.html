<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Y99 Style Chat App</title>
    <style>
        /* Basic CSS Styling */
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; margin: 0; background: #f0f2f5; height: 100vh; display: flex; justify-content: center; align-items: center; }
        
        /* Login Box */
        .auth-box { background: white; padding: 30px; border-radius: 10px; box-shadow: 0 4px 10px rgba(0,0,0,0.1); width: 300px; text-align: center; }
        input { width: 90%; padding: 10px; margin: 10px 0; border: 1px solid #ddd; border-radius: 5px; }
        button { width: 95%; padding: 10px; background: #4a76a8; color: white; border: none; border-radius: 5px; cursor: pointer; font-size: 16px; margin-top: 5px; }
        button:hover { background: #3a6598; }
        .secondary-btn { background: #ccc; color: #333; }
        .hidden { display: none; }

        /* Main Chat Interface */
        .main-container { display: none; width: 100%; height: 100%; }
        .sidebar { width: 300px; background: white; height: 100%; border-right: 1px solid #ddd; display: flex; flex-direction: column; }
        .sidebar-header { padding: 15px; background: #4a76a8; color: white; display: flex; justify-content: space-between; align-items: center; }
        .user-list { flex: 1; overflow-y: auto; }
        .list-item { padding: 15px; border-bottom: 1px solid #eee; cursor: pointer; }
        .list-item:hover { background: #f9f9f9; }
        
        .chat-area { flex: 1; display: flex; flex-direction: column; background: #e5ddd5; }
        .chat-header { padding: 15px; background: #4a76a8; color: white; display: flex; justify-content: space-between; }
        .messages-box { flex: 1; padding: 20px; overflow-y: auto; }
        .msg { margin-bottom: 10px; max-width: 60%; padding: 10px; border-radius: 10px; background: white; clear: both; }
        .my-msg { background: #dcf8c6; float: right; }
        .input-box { padding: 15px; background: #f0f0f0; display: flex; }
        .input-box input { flex: 1; margin: 0; }
        .input-box button { width: auto; margin-left: 10px; }

        /* Admin Panel */
        .admin-bar { background: #ff9800; color: white; padding: 10px; cursor: pointer; text-align: center; }
    </style>
</head>
<body>

    <!-- LOGIN / SIGNUP SCREEN -->
    <div id="authScreen" class="auth-box">
        <h2>Welcome to Chat</h2>
        <input type="text" id="nameInput" placeholder="Your Name">
        <input type="email" id="emailInput" placeholder="Email (Temp mail allowed)">
        <input type="password" id="passInput" placeholder="Password">
        <button onclick="handleLogin()">Login / Signup</button>
        <p style="font-size: 12px; color: gray; margin-top: 10px;">First time? Just enter details and click Login.</p>
    </div>

    <!-- MAIN APP -->
    <div id="mainScreen" class="main-container">
        <!-- Left Sidebar -->
        <div class="sidebar">
            <div class="sidebar-header">
                <span id="myName">Hi, User</span>
                <button onclick="logout()" style="width:auto; padding:5px 10px; font-size:12px;">Logout</button>
            </div>
            <div id="adminAccess" class="admin-bar hidden" onclick="openAdmin()">Admin Panel</div>
            <div class="user-list" id="contactsList">
                <!-- Yahan Users aur Groups aayenge -->
            </div>
            <button onclick="createGroupPrompt()" style="border-radius:0;">Create Group</button>
        </div>

        <!-- Right Chat Area -->
        <div class="chat-area">
            <div class="chat-header">
                <span id="chatTitle">Select a chat</span>
                <button id="blockBtn" class="hidden" onclick="blockUser()" style="width:auto; padding:5px 10px; background:red;">Block User</button>
            </div>
            <div class="messages-box" id="chatMessages">
                <!-- Messages yahan aayenge -->
            </div>
            <div class="input-box">
                <input type="text" id="msgInput" placeholder="Type a message...">
                <button onclick="sendMessage()">Send</button>
            </div>
        </div>
    </div>

    <!-- Appwrite SDK -->
    <script src="https://cdn.jsdelivr.net/npm/appwrite@11.0.0"></script>
    <script src="script.js"></script>
</body>
</html>
